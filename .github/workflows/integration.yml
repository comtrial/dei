# Standalone integration runner (label-gated convenience).
#
# The authoritative chat merge gate is .github/workflows/chat-verify.yml —
# it runs integration on EVERY PR and FAILS when 0 cases execute. This file
# stays as an opt-in (`needs-db` label) full-suite runner; it now also injects
# the service-role key so chat-conversations-rls.test.ts does not silently
# skip here either.
name: Integration tests

on:
  pull_request:
    types: [labeled, synchronize]
  push:
    branches: [main]

jobs:
  supabase:
    # Runs on PRs labeled `needs-db` and on every main push.
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'needs-db') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start supabase stack
        run: supabase start

      - run: pnpm install --frozen-lockfile

      - name: Export Supabase service-role key
        run: |
          set -euo pipefail
          supabase status -o env > supabase-status.env
          SRK="$(grep -E '^SERVICE_ROLE_KEY=' supabase-status.env | head -n1 | cut -d= -f2-)"
          SRK="${SRK%\"}"; SRK="${SRK#\"}"
          if [ -z "$SRK" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY missing — chat integration would skip."
            exit 1
          fi
          echo "SUPABASE_SERVICE_ROLE_KEY=$SRK" >> "$GITHUB_ENV"

      - name: Run integration tests
        env:
          RUN_INTEGRATION: '1'
          EXPO_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
        run: pnpm test:integration

      - if: always()
        run: supabase stop --no-backup
